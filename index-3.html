<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d12">
<link rel="manifest" href="manifest.json">
<title>Program Lucru 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d12;--card:#16161f;--card2:#1c1c28;--border:#2a2a3a;--accent:#f0c040;--blue:#5b8cff;--green:#4ade80;--red:#f87171;--orange:#fb923c;--purple:#c084fc;--depou:#fef08a;--sarb:#ff6b6b;--text:#e8e8f0;--muted:#5a5a75;--sub:#3a3a52;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;padding:12px;padding-bottom:max(60px,calc(env(safe-area-inset-bottom) + 20px));-webkit-overflow-scrolling:touch;}

/* SELECTOR DEPOU */
.depot-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px;}
.depot-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--accent);text-align:center;}
.depot-sub{font-size:0.68rem;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:0.1em;}
.depot-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;}
.depot-card{padding:18px 20px;border-radius:14px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;gap:14px;}
.depot-card:active{background:var(--card2);}
.depot-card.sel{border-color:var(--accent);background:rgba(240,192,64,0.08);}
.depot-icon{font-size:2rem;}
.depot-info{}
.depot-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);}
.depot-desc{font-size:0.6rem;color:var(--muted);margin-top:2px;}
.depot-btn{width:100%;max-width:340px;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#0d0d12;font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:500;cursor:pointer;}
.depot-change{font-size:0.6rem;color:var(--muted);cursor:pointer;text-decoration:underline;text-align:center;margin-top:4px;}

header{text-align:center;padding:16px 0 10px;}
header h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--accent);letter-spacing:-0.02em;}
header p{color:var(--muted);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;margin-top:2px;}
.depot-badge{display:inline-block;margin-top:5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(240,192,64,0.4);background:rgba(240,192,64,0.08);font-size:0.6rem;color:var(--accent);cursor:pointer;}

.month-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none;}
.month-tabs::-webkit-scrollbar{display:none;}
.month-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.68rem;cursor:pointer;white-space:nowrap;}
.month-tab.active{background:var(--accent);color:#0d0d12;border-color:var(--accent);font-weight:500;}
.month-tab.has-data{border-color:rgba(91,140,255,0.4);color:var(--blue);}

.legend{display:flex;flex-wrap:wrap;gap:7px 12px;justify-content:center;margin-bottom:14px;padding:10px 12px;background:var(--card);border-radius:10px;border:1px solid var(--border);}
.li{display:flex;align-items:center;gap:5px;font-size:0.62rem;color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.month-title{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;}
.month-stats{font-size:0.62rem;color:var(--muted);}

.day-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;overflow:hidden;}
.day-card.today-card{border-color:var(--accent);}
.day-card.sarb-card{border-color:rgba(255,107,107,0.45);background:rgba(255,107,107,0.025);}
.day-card.sarb-card .day-header{background:rgba(255,107,107,0.07);}
.day-card.we-card{border-color:rgba(192,132,252,0.4);background:rgba(192,132,252,0.02);}
.day-card.we-card .day-header{background:rgba(192,132,252,0.06);}
.we-num{color:var(--purple);}

.day-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--card2);}
.day-left{display:flex;align-items:center;gap:9px;}
.day-num{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;min-width:26px;line-height:1;}
.today-num{color:var(--accent);}
.sarb-num{color:var(--sarb);}
.day-name{font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;}
.sarb-lbl{font-size:0.58rem;color:var(--sarb);margin-top:1px;}
.day-type-lbl{font-size:0.56rem;color:var(--muted);margin-top:1px;}
.right-col{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.tur-badge{font-size:0.6rem;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.tb-s1{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.35);}
.tb-s2{background:rgba(91,140,255,0.15);color:var(--blue);border:1px solid rgba(91,140,255,0.3);}
.tb-we1{background:rgba(251,146,60,0.12);color:var(--orange);border:1px solid rgba(251,146,60,0.3);}
.tb-we2{background:rgba(192,132,252,0.15);color:var(--purple);border:1px solid rgba(192,132,252,0.3);}
.tb-libre{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
.tb-co{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
.tb-sarb{background:rgba(255,107,107,0.12);color:var(--sarb);border:1px solid rgba(255,107,107,0.3);}
.tb-gol{background:rgba(90,90,117,0.12);color:var(--muted);border:1px solid rgba(90,90,117,0.25);}
.sch-badge{font-size:0.52rem;padding:2px 6px;border-radius:10px;}
.sch1b{background:rgba(251,146,60,0.15);color:var(--orange);}
.sch2b{background:rgba(91,140,255,0.12);color:var(--blue);}

.shift-display{padding:8px 12px 10px;}
.shift-block{border-radius:8px;padding:8px 12px;}
.s1-block{background:rgba(254,240,138,0.05);border:1px solid rgba(254,240,138,0.45);}
.s2-block{background:rgba(91,140,255,0.06);border:1px solid rgba(91,140,255,0.35);}
.s2d-block{background:rgba(254,240,138,0.05);border:1px solid rgba(254,240,138,0.45);}
.s-lbl{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
.s1-block .s-lbl{color:var(--depou);}
.s2-block .s-lbl{color:var(--blue);}
.s2d-block .s-lbl{color:var(--depou);}
.dep-tag{font-size:0.58rem;color:var(--depou);margin-bottom:3px;}
.capac{font-size:0.68rem;color:var(--accent);font-weight:500;margin-bottom:3px;}
.ore{display:flex;align-items:center;gap:4px;}
.t{font-size:1.08rem;font-weight:500;color:#fff;}
.sep{color:var(--muted);font-size:0.68rem;}
.s1-block .t,.s2d-block .t{color:var(--depou);}

/* Giurgiu - fara schimb, doar ore */
.g-block{border-radius:8px;padding:8px 12px;background:rgba(91,140,255,0.06);border:1px solid rgba(91,140,255,0.35);}
.g-block.g-dep{background:rgba(254,240,138,0.05);border:1px solid rgba(254,240,138,0.45);}
.g-lbl{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;color:var(--blue);}
.g-block.g-dep .g-lbl{color:var(--depou);}
.g-ore{display:flex;align-items:center;gap:4px;}
.g-t{font-size:1.08rem;font-weight:500;color:#fff;}
.g-block.g-dep .g-t{color:var(--depou);}
.g-sep{color:var(--muted);font-size:0.68rem;}
.g-linie{font-size:0.62rem;color:var(--accent);font-weight:500;margin-bottom:3px;}

.state-block{padding:8px 12px 10px;font-size:0.7rem;}
.st-libre{color:var(--green);}
.st-co{color:var(--red);}
.st-sarb{color:var(--sarb);}
.st-gol{color:var(--muted);font-style:italic;}

.edit-btn{display:block;width:calc(100% - 24px);margin:0 12px 10px;background:rgba(90,90,117,0.1);border:1px dashed rgba(90,90,117,0.35);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.63rem;padding:10px 6px;border-radius:7px;cursor:pointer;text-align:center;min-height:44px;}
.edit-btn:active{background:rgba(91,140,255,0.1);color:var(--blue);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:#1a1a26;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent);margin-bottom:2px;}
.modal-sub{font-size:0.6rem;color:var(--muted);margin-bottom:14px;}
.m-lbl{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;display:block;margin:12px 0 6px;}
.m-div{height:1px;background:var(--border);margin:8px 0 12px;}
.quick-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.q-btn{padding:9px 4px;border-radius:9px;border:1px solid var(--border);background:var(--card2);font-family:'DM Mono',monospace;font-size:0.68rem;cursor:pointer;text-align:center;}
.q-libre{border-color:rgba(74,222,128,0.35);color:var(--green);}
.q-co{border-color:rgba(248,113,113,0.35);color:var(--red);}
.q-sarb{border-color:rgba(255,107,107,0.35);color:var(--sarb);}
.tip-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.tip-btn{padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.67rem;cursor:pointer;text-align:center;}
.tip-btn.act{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,0.08);}

/* Giurgiu modal - schimb selector */
.sch-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sch-btn{padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--card2);font-family:'DM Mono',monospace;font-size:0.7rem;cursor:pointer;text-align:center;color:var(--muted);line-height:1.5;}
.sch-btn .hint{font-size:0.55rem;color:var(--muted);}
.sch-btn.act1{border-color:var(--orange);color:var(--orange);background:rgba(251,146,60,0.08);}
.sch-btn.act2{border-color:var(--blue);color:var(--blue);background:rgba(91,140,255,0.08);}

.linie-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px;}
.linie-btn{padding:10px 4px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:500;cursor:pointer;text-align:center;}
.linie-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,0.1);}
.tur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-height:200px;overflow-y:auto;padding:2px;}
.tur-btn{padding:8px 3px;border-radius:7px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:'DM Mono',monospace;font-size:0.67rem;cursor:pointer;text-align:center;}
.tur-btn.dt{border-color:rgba(254,240,138,0.3);}
.tur-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,0.1);}

.preview{background:#111118;border:1px solid var(--sub);border-radius:9px;padding:12px;margin:12px 0;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-align:center;}
.pv-ore{color:#fff;font-size:1.1rem;font-weight:500;}
.pv-dep{color:var(--depou);font-size:0.58rem;}
.pv-linie{color:var(--accent);font-size:0.72rem;font-weight:500;}
.pv-capac{color:var(--accent);font-size:0.8rem;font-weight:500;}
.pv-dep-main{color:var(--depou);font-size:0.72rem;font-weight:500;}

.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.btn-save{padding:16px 12px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:500;cursor:pointer;min-height:50px;}
.btn-cancel{padding:16px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.78rem;cursor:pointer;min-height:50px;}
</style>
</head>
<body>

<!-- SELECTOR DEPOU -->
<div class="depot-screen" id="depot-screen">
  <div class="depot-title">🚌 Program 2026</div>
  <div class="depot-sub">Alege depoul tău</div>
  <div class="depot-cards">
    <div class="depot-card" id="dc-dudesti" onclick="selDepot('dudesti')">
      <div class="depot-icon">🚃</div>
      <div class="depot-info">
        <div class="depot-name">Depoul Dudești</div>
        <div class="depot-desc">Linii: 1 · 5 · 7 · 10 · 27</div>
      </div>
    </div>
    <div class="depot-card" id="dc-giurgiu" onclick="selDepot('giurgiu')">
      <div class="depot-icon">🚃</div>
      <div class="depot-info">
        <div class="depot-name">Depoul Giurgiu</div>
        <div class="depot-desc">Linii: 1 · 7 · 25</div>
      </div>
    </div>
  </div>
  <button class="depot-btn" onclick="confirmDepot()">Continuă →</button>
</div>

<!-- APLICATIE PRINCIPALA -->
<div id="app" style="display:none">
<header>
  <h1 id="app-title">Program 2026</h1>
  <p id="app-sub">Schimb 1 &amp; 2 · Editabil</p>
  <div class="depot-badge" onclick="showDepotScreen()">🔄 Schimbă depoul</div>
</header>
<div class="month-tabs" id="month-tabs"></div>
<div class="legend" id="legend"></div>
<div id="month-view"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="mtitle"></div>
    <div class="modal-sub" id="msub"></div>
    <span class="m-lbl">Acțiuni rapide</span>
    <div class="quick-grid">
      <button class="q-btn q-libre" onclick="setQ('liber')">🟢 Liber</button>
      <button class="q-btn q-co" onclick="setQ('co')">🔴 CO</button>
      <button class="q-btn q-sarb" onclick="setQ('sarb')">🎉 Sărbătoare</button>
    </div>
    <div class="m-div"></div>
    <span class="m-lbl" id="tip-lbl">Indicatori</span>
    <div class="tip-btns" id="tip-btns-wrap">
      <button class="tip-btn" id="tzl" onclick="sTip('zl')">📅 Zi lucrătoare</button>
      <button class="tip-btn" id="twe" onclick="sTip('we')">🗓️ Sâmbătă/Duminică</button>
    </div>
    <!-- Schimb - doar Dudești -->
    <div id="sch-section">
      <span class="m-lbl">Schimb</span>
      <div class="sch-btns">
        <button class="sch-btn" id="s1btn" onclick="sSch(1)">1 — Dimineață<br><span class="hint">Plecare din depou</span></button>
        <button class="sch-btn" id="s2btn" onclick="sSch(2)">2 — După-amiază<br><span class="hint">Schimb de tură</span></button>
      </div>
    </div>
    <span class="m-lbl" id="lbl-linie">Linia</span>
    <div class="linie-grid" id="liniegrid"></div>
    <div id="tur-section" style="display:none">
      <span class="m-lbl" id="lbl-tur">Tur</span>
      <div class="tur-grid" id="turgrid"></div>
    </div>
    <div class="preview" id="preview"><span style="color:var(--muted);font-size:0.66rem">Alege linia și turul</span></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeM()">Anulează</button>
      <button class="btn-save" onclick="saveD()">✓ Salvează</button>
    </div>
  </div>
</div>

// ===================== CALCUL ORE =====================
// Format tur key: Giurgiu "3/1" linie="1" -> "T3 L1"
function fmtTur(k,linie){
  const tur=k.split('/')[0];
  return `T${tur} L${linie}`;
}
// Format tur key: Dudesti "7/7" -> "T7 L7" / "9/1" -> "T9 L1"
function fmtTurD(k){
  const parts=k.split('/');
  if(parts.length===2) return `T${parts[0]} L${parts[1]}`;
  return k;
}

function calcOre(i,r){
  const [ih,im]=i.split(':').map(Number);
  const [rh,rm]=r.split(':').map(Number);
  let s=ih*60+im,e=rh*60+rm;
  if(e<=s)e+=24*60;
  return e-s;
}
function fmtOre(min){
  const h=Math.floor(min/60),m=min%60;
  return m>0?`${h}h ${m}m`:`${h}h`;
}

// ===================== TABS =====================
function rTabs(){
  const tabs=document.getElementById('month-tabs');tabs.innerHTML='';
  LUNI.forEach((l,i)=>{
    let hd=false;
    const mem=getMEM();
    try{hd=Object.keys(mem).some(k=>k.startsWith(`${l.a}-${l.l}-`));}catch(e){}
    const b=document.createElement('button');
    b.className='month-tab'+(i===window.LA?' active':'')+(hd?' has-data':'');
    b.textContent=l.n;
    b.onclick=()=>{window.LA=i;rTabs();rMonth();};
    tabs.appendChild(b);
  });
}

// ===================== LUNA =====================
function rMonth(){
  const l=LUNI[window.LA];const v=document.getElementById('month-view');v.innerHTML='';
  let lc=0,totalMin=0;
  const db=getDB();
  for(let d=1;d<=l.z;d++){
    const s=gs(l.a,l.l,d);
    if(s.t==='zl'||s.t==='we'){
      lc++;
      if(s.r){
        const dbd=s.t==='we'?db.we:db.zl;
        const dd=dbd[s.r];
        if(dd){
          if(DEPOT==='giurgiu'){
            // Giurgiu: sch1 ore + sch2 ore
            const sch=s.s||1;
            const ore=sch===1?calcOre(dd.s1.i,dd.s1.r):calcOre(dd.s2.i,dd.s2.r);
            totalMin+=ore;
          } else {
            const sch=s.s||2;
            const ore=sch===1?calcOre(dd.s1.i,dd.s1.r):calcOre(dd.s2.i,dd.s2.r);
            totalMin+=ore;
          }
        }
      }
    }
  }
  const h=document.createElement('div');h.className='month-header';
  const oreStr=totalMin>0?` · <span style="color:var(--green)">${fmtOre(totalMin)} lucrate</span>`:'';
  h.innerHTML=`<div class="month-title">${l.n} ${l.a}</div><div class="month-stats">${lc} zile lucrate${oreStr}</div>`;
  v.appendChild(h);
  for(let d=1;d<=l.z;d++)v.appendChild(rDay(l.a,l.l,d));
  if(totalMin>0){
    const footer=document.createElement('div');
    footer.style.cssText='margin:14px 0 8px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;justify-content:space-between;align-items:center;';
    footer.innerHTML=`<div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Total ore lucrate</div><div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--green)">${fmtOre(totalMin)}</div>`;
    v.appendChild(footer);
  }
}

// ===================== ZI =====================
function rDay(a,luna,z){
  const s=gs(a,luna,z);const sarb=getSarb(a,luna,z);
  const td=isTD(a,luna,z);const nZ=nz(a,luna,z);const sch=s.s||(DEPOT==='giurgiu'?1:2);
  const weDay=isWE(a,luna,z);
  const card=document.createElement('div');
  card.className='day-card'+(td?' today-card':'')+(sarb&&s.t==='gol'?' sarb-card':weDay&&!sarb?' we-card':'');

  let bc='tb-gol',bt='—';
  if(s.t==='liber'){bc='tb-libre';bt='Liber';}
  else if(s.t==='co'){bc='tb-co';bt='CO';}
  else if(s.t==='sarb'){bc='tb-sarb';bt='Sărbătoare';}
  else if(s.t==='zl'||s.t==='we'){
    if(DEPOT==='giurgiu'){
      if(s.r){const db=getDB();const dbd=s.t==='we'?db.we:db.zl;const dd=dbd[s.r];bc='tb-s1';bt=dd?fmtTur(s.r,dd.linie):(s.r);}
    } else {
      bc=s.t==='zl'?(sch===1?'tb-s1':'tb-s2'):(sch===1?'tb-we1':'tb-we2');bt=s.r?fmtTurD(s.r):'?';
    }
  }

  const sb=(DEPOT!=='giurgiu'&&(s.t==='zl'||s.t==='we'))?`<span class="sch-badge ${sch===1?'sch1b':'sch2b'}">Sch${sch}</span>`:'';
  const tl=s.t==='zl'?'zi lucrătoare':s.t==='we'?'weekend':s.t==='co'?'concediu':s.t==='sarb'?'sărbătoare':s.t==='liber'?'liber':'necompletat';

  let html=`<div class="day-header">
    <div class="day-left">
      <div class="day-num${td?' today-num':''}${sarb?' sarb-num':weDay?' we-num':''}">${z}</div>
      <div>
        <div class="day-name">${nZ}${td?' ★':''}</div>
        ${sarb?`<div class="sarb-lbl">🎉 ${sarb}</div>`:''}
        <div class="day-type-lbl">${s.r?(DEPOT==='giurgiu'?fmtTurD(s.r):fmtTurD(s.r))+' · ':''}${tl}</div>
      </div>
    </div>
    <div class="right-col"><span class="tur-badge ${bc}">${bt}</span>${sb}</div>
  </div>`;

  if(s.t==='sarb'){html+=`<div class="state-block st-sarb">🎉 Sărbătoare legală${sarb?' — '+sarb:''}</div>`;}
  else if(s.t==='co'){html+=`<div class="state-block st-co">🔴 Concediu de odihnă</div>`;}
  else if(s.t==='liber'){html+=`<div class="state-block st-libre">🟢 Zi liberă</div>`;}
  else if((s.t==='zl'||s.t==='we')&&s.r){
    const db=getDB();const dbd=s.t==='we'?db.we:db.zl;const dd=dbd[s.r];
    if(dd){
      if(DEPOT==='giurgiu'){
        // Giurgiu: afisam doar orele, fara schimb
        const schG=s.s||1;
        const isDep=schG===2&&dd.s2.d || schG===1&&false;
        const oreD=schG===1?dd.s1:dd.s2;
        const depou=schG===2&&dd.s2.d;
        html+=`<div class="shift-display"><div class="g-block${depou?' g-dep':''}">
          <div class="g-linie">🚌 ${fmtTur(s.r,dd.linie)}</div>
          <div class="g-lbl">${schG===1?'▶ Schimbul 1 — Dimineață':'▶ Schimbul 2 — După-amiază'}${depou?' · Plecare din DEPOU':''}</div>
          <div class="g-ore"><span class="g-t">${oreD.i}</span><span class="g-sep">→</span><span class="g-t">${oreD.r}</span></div>
        </div></div>`;
      } else {
        if(sch===1){
          html+=`<div class="shift-display"><div class="shift-block s1-block">
            <div class="s-lbl">▶ Schimbul 1 — Dimineață</div>
            <div class="dep-tag">🚌 Plecare din DEPOU</div>
            <div class="ore"><span class="t">${dd.s1.i}</span><span class="sep">→</span><span class="t">${dd.s1.r}</span></div>
          </div></div>`;
        } else {
          const dc=dd.s2.d?' s2d-block':' s2-block';
          html+=`<div class="shift-display"><div class="shift-block${dc}">
            <div class="s-lbl">▶ Schimbul 2 — După-amiază</div>
            ${dd.s2.d?'<div class="dep-tag">🚌 Plecare din DEPOU</div>':''}
            <div class="capac">${dd.s2.c}</div>
            <div class="ore"><span class="t">${dd.s2.i}</span><span class="sep">→</span><span class="t">${dd.s2.r}</span></div>
          </div></div>`;
        }
      }
    } else {html+=`<div class="state-block" style="color:var(--orange)">⚠️ Date lipsă: ${s.r}</div>`;}
  } else {
    html+=`<div class="state-block st-gol">${sarb?'🎉 Sărbătoare — apasă pentru completare':'Apasă pentru a completa'}</div>`;
  }

  html+=`<button class="edit-btn" onclick="openM(${a},${luna},${z})">✏️ Modifică</button>`;
  card.innerHTML=html;return card;
}

  if(weekend){
    document.getElementById('tzl').style.display='none';
    document.getElementById('twe').style.display='';
    document.getElementById('tip-lbl').textContent='Indicatori (weekend)';
  } else {
    document.getElementById('tzl').style.display='';
    document.getElementById('twe').style.display='';
    document.getElementById('tip-lbl').textContent='Indicatori — alege tipul zilei';
  }

  // Schimb section - Giurgiu are schimb dar fara capac/depou info
  const schSec=document.getElementById('sch-section');
  schSec.style.display='block';
  if(DEPOT==='giurgiu'){
    document.getElementById('s1btn').textContent='';
    document.getElementById('s1btn').innerHTML='1 — Dimineață<br><span class="hint">Sch 1</span>';
    document.getElementById('s2btn').innerHTML='2 — După-amiază<br><span class="hint">Sch 2</span>';
  } else {
    document.getElementById('s1btn').innerHTML='1 — Dimineață<br><span class="hint">Plecare din depou</span>';
    document.getElementById('s2btn').innerHTML='2 — După-amiază<br><span class="hint">Schimb de tură</span>';
  }

  // Initializeaza linia din turul salvat
  if(s.r){
    mLinie=DEPOT==='giurgiu'?
      (getDB()[mT==='we'?'we':'zl'][s.r]?.linie||null):
      (s.r.split('/')[1]||null);
  } else { mLinie=null; }
  document.getElementById('modal').classList.add('active');
  document.getElementById('tur-section').style.display=mLinie?'block':'none';
  uTip();uSch();rLG();if(mLinie)rTG();uPrev();
}

function closeM(){document.getElementById('modal').classList.remove('active');}
function setQ(t){ss(mA,mL,mZ,{t,r:null,s:mS});rMonth();rTabs();closeM();}
function sTip(t){mT=t;mR=null;mLinie=null;document.getElementById('tur-section').style.display='none';uTip();rLG();uPrev();}
function sSch(s){mS=s;uSch();uPrev();}

function uTip(){
  document.getElementById('tzl').className='tip-btn'+(mT==='zl'?' act':'');
  document.getElementById('twe').className='tip-btn'+(mT==='we'?' act':'');
}
function uSch(){
  document.getElementById('s1btn').className='sch-btn'+(mS===1?' act1':'');
  document.getElementById('s2btn').className='sch-btn'+(mS===2?' act2':'');
}

let mLinie=null; // linia selectata in modal

function getLinii(){
  const db=getDB();
  const dbd=mT==='we'?db.we:db.zl;
  const linii=new Set();
  Object.entries(dbd).forEach(([k,v])=>{
    if(DEPOT==='giurgiu') linii.add(v.linie);
    else linii.add(k.split('/')[1]);
  });
  return Array.from(linii).sort((a,b)=>Number(a)-Number(b));
}

function rLG(){
  // Render linie grid
  const g=document.getElementById('liniegrid');g.innerHTML='';
  const linii=getLinii();
  linii.forEach(l=>{
    const b=document.createElement('button');
    b.className='linie-btn'+(mLinie===l?' sel':'');
    b.textContent='L'+l;
    b.onclick=()=>{
      mLinie=l;mR=null;
      rLG();
      document.getElementById('tur-section').style.display='block';
      rTG();uPrev();
    };
    g.appendChild(b);
  });
  // Daca linia selectata nu mai exista in tipul curent, resetam
  if(mLinie && !linii.includes(mLinie)){
    mLinie=null;mR=null;
    document.getElementById('tur-section').style.display='none';
  }
}

function rTG(){
  const g=document.getElementById('turgrid');g.innerHTML='';
  if(!mLinie) return;
  const db=getDB();
  const dbd=mT==='we'?db.we:db.zl;
  // Filtram doar tururile pentru linia selectata
  Object.entries(dbd).forEach(([k,v])=>{
    const linie=DEPOT==='giurgiu'?v.linie:k.split('/')[1];
    if(linie!==mLinie) return;
    const b=document.createElement('button');
    const isDep=v.s2&&v.s2.d;
    let cls='tur-btn'+(isDep?' dt':'');
    if(mR===k) cls+=' sel';
    const tur=k.split('/')[0];
    b.textContent='T'+tur;
    b.className=cls;
    b.onclick=()=>{mR=k;rTG();uPrev();};
    g.appendChild(b);
  });
  document.getElementById('lbl-tur').textContent='Tur — Linia '+mLinie;
}

function uPrev(){
  const box=document.getElementById('preview');
  if(!mR){box.innerHTML='<span style="color:var(--muted);font-size:0.66rem">Alege tur</span>';return;}
  const db=getDB();const dbd=mT==='we'?db.we:db.zl;const d=dbd[mR];
  if(!d){box.innerHTML='<span style="color:var(--orange)">Date lipsă</span>';return;}

  if(DEPOT==='giurgiu'){
    const oreD=mS===1?d.s1:d.s2;
    const depou=mS===2&&d.s2.d;
    box.innerHTML=`<span class="pv-linie">🚌 ${fmtTur(mR,d.linie)}</span>${depou?'<span class="pv-dep">Plecare din DEPOU</span>':''}<span class="pv-ore" style="${depou?'color:var(--depou)':''}">${oreD.i} → ${oreD.r}</span>`;
  } else {
    if(mS===1){
      box.innerHTML=`<span class="pv-dep-main">🚌 Plecare din DEPOU</span><span class="pv-ore" style="color:var(--depou)">${d.s1.i} → ${d.s1.r}</span>`;
    } else {
      box.innerHTML=`<span class="pv-capac">${d.s2.c}</span>${d.s2.d?'<span class="pv-dep">🚌 Plecare din DEPOU</span>':''}<span class="pv-ore">${d.s2.i} → ${d.s2.r}</span>`;
    }
  }
}

function saveD(){
  if(!mR){closeM();return;}
  ss(mA,mL,mZ,{t:mT,r:mR,s:mS});rMonth();rTabs();closeM();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM();});

// ===================== INIT =====================
try{
  const saved=localStorage.getItem('p2026_depot');
  if(saved){
    DEPOT=saved;
    selectedDepot=saved;
    document.getElementById('depot-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }
}catch(e){}
</script>
</body>
</html>
